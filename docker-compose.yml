# Docker Compose for js-doc-store-server local development

version: '3.8'

services:
  doc-store-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: js-doc-store-server
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATA_DIR=/app/data
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-change-in-production}
      - VAULT_SECRET=${VAULT_SECRET:-dev-vault-secret-change-in-production}
      - DB_ENCRYPTION_KEY=${DB_ENCRYPTION_KEY:-dev-encryption-key}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin123!}
      # Optional: Embedding worker configuration
      # - EMBEDDING_WORKER_URL=${EMBEDDING_WORKER_URL}
      # - EMBEDDING_API_KEY=${EMBEDDING_API_KEY}
    volumes:
      # Persist data between container restarts
      - ./data:/app/data
      # Sync source code for development (hot reload)
      - ./server.js:/app/server.js:ro
      - ./js-vector-store.js:/app/js-vector-store.js:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/public/tables"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

