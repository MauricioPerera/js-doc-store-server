# Cloudflare Workers Configuration for js-doc-store-server
# Replace the KV namespace id with your actual ID after running:
# npm run cf:kv:create

name = "js-doc-store-server"
main = "cloudflare-worker.js"
compatibility_date = "2024-01-01"

# KV Namespace binding
[[kv_namespaces]]
binding = "DOC_STORE_KV"
id = "b0c25c0bfde041a69b4e560770ce6552"

# Workers AI binding (optional - for direct embedding generation)
[ai]
binding = "AI"

# Environment variables (public)
[vars]
NODE_ENV = "production"

# Secrets (use: wrangler secret put <name>)
# Do NOT add secrets here - use the CLI command instead
# Required secrets:
#   JWT_SECRET - For JWT authentication
#   VAULT_SECRET - For vault encryption
#   EMBEDDING_WORKER_URL - URL of the Gemma embedding worker (e.g., https://gemma-embedding-worker.your-subdomain.workers.dev)
#   EMBEDDING_API_KEY - API key for the embedding worker
